  - Data Extraction
  - Proxies
  - Browser Automation
description: ZenRows sells a subscription that bundles four request budgets — Basic, JS Rendering,
  Premium Proxy, and Protected sites — together with a concurrency cap and a max-download size.
  All four products (Universal Scraper API, Scraping Browser, Residential Proxies, Scraper APIs)
  share the same account and credit pool, with the Scraping Browser billed additionally per
  bandwidth-GB and session-hour. Tiers escalate from a $1 free trial through six paid tiers up
  to custom enterprise contracts above $2,999.99/month.
sources:
  - https://www.zenrows.com/pricing
  - https://docs.zenrows.com/first-steps/pricing
