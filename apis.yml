aid: zenrows
name: ZenRows
description: 'ZenRows is a Spanish web scraping platform headquartered in Madrid that lets developers
  collect public web data at scale without managing proxies, browsers, or CAPTCHAs. A single API key
  unlocks four products against a shared 55M+ residential IP pool across 190+ countries: the Universal
  Scraper API (HTTP scrape with JS rendering, anti-bot bypass, screenshots, CSS/AI extraction, and
  PDF/markdown output), the Scraping Browser (cloud Playwright/Puppeteer/CDP browser over WebSocket),
  Residential Proxies (HTTP/SOCKS5 with sticky sessions and country targeting), and a set of vertical
  Scraper APIs for Amazon, Google, Walmart, Zillow, and Idealista. ZenRows also ships first-party
  Python, Node.js, and Go SDKs, a Scrapy middleware, deep integrations across Playwright, Puppeteer,
  Selenium, Scrapy, LangChain, LlamaIndex, OpenAI Agents SDK, Zapier, n8n, Make, Pipedream, Node-RED,
  MuleSoft, Clay, and an official MCP server (hosted at https://mcp.zenrows.com/mcp and as @zenrows/mcp
  on npm) exposing scrape and 30+ browser automation tools to AI agents.'
type: Provider
position: Consumer
access: 3rd-Party
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
