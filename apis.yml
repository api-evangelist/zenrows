- aid: zenrows:residential-proxies
  name: ZenRows Residential Proxies
  description: HTTP and SOCKS5 residential proxy network with 55M+ IPs across 190+ countries,
    username/password authentication, country and world-region targeting (e.g. country-es for Spain),
    and sticky-session TTL configurable from 30 seconds up to 1 day. Sold by bandwidth rather than
    request count; intended as a drop-in proxy for any HTTP client, browser, or scraping framework.
  humanURL: https://docs.zenrows.com/residential-proxies/introduction
