- aid: zenrows:mcp
  name: ZenRows MCP Server
  description: Official ZenRows Model Context Protocol server that exposes the scraping platform
    to AI assistants. Available as a remote hosted server at https://mcp.zenrows.com/mcp with OAuth
    bearer authentication, or locally via the npm package @zenrows/mcp (npx -y @zenrows/mcp). Ships
    scrape tools for Markdown/HTML/JSON/plaintext/PDF/screenshots and 30+ browser_* tools covering
    navigation, clicks, form fills, JavaScript execution, cookies, tabs, and persistent sessions.
  humanURL: https://docs.zenrows.com/integrations/mcp/mcp-overview
