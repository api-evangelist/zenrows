- aid: zenrows:scraper-apis
  name: ZenRows Scraper APIs
  description: Vertical, structured-data scraper endpoints for major commerce and real-estate sites,
    sharing the api.zenrows.com authentication and credit model. Covers Amazon (ASIN lookup,
    discovery), Google (search results), Walmart (discovery, product information, product reviews),
    Zillow (discovery, property data), and Idealista (discovery, property data, Spanish real-estate
    focus). Returns parsed JSON rather than raw HTML, with provider-managed selectors that absorb
    site-side layout changes.
  humanURL: https://docs.zenrows.com/scraper-apis/introduction
