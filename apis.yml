apis:
- aid: zenrows:universal-scraper-api
  name: ZenRows Universal Scraper API
  description: HTTP scraping API at https://api.zenrows.com/v1/ that fetches any URL with optional
    JavaScript rendering, anti-bot bypass via Adaptive Stealth Mode, premium residential proxies,
    country-level geo-targeting, session pinning (up to 10 minutes), custom headers, CSS extractors,
    AI autoparse, wait/wait_for synchronization, JavaScript instructions, full-page or element
    screenshots (PNG/JPEG), and output conversion to markdown, plaintext, or PDF. Authentication is
    by apikey query parameter. Response headers expose Concurrency-Limit, Concurrency-Remaining,
    X-Request-Cost, X-Request-Id, and Zr-Final-Url for cost and observability.
  humanURL: https://docs.zenrows.com/universal-scraper-api/api-reference
