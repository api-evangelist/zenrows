- aid: zenrows:scraping-browser
  name: ZenRows Scraping Browser
  description: Cloud headless browser exposed over WebSocket at wss://browser.zenrows.com?apikey=KEY,
    compatible with Playwright, Puppeteer, and the underlying Chrome DevTools Protocol. Each session
    runs on the ZenRows infrastructure with automatic rotation across 55M+ residential IPs in 190+
    countries, country and world-region targeting, configurable session TTL, and 99.9% uptime.
    Billed per session-hour ($0.09/hr in 30-second increments) plus per-GB bandwidth (from $5.50/GB,
    discounted to $2.80/GB at Enterprise). Suited to single-page apps, complex user flows, and
    long-running interactive scraping.
  humanURL: https://docs.zenrows.com/scraping-browser/introduction
