- aid: zenrows:sdks
  name: ZenRows SDKs
  description: First-party SDKs that wrap the Universal Scraper API and Residential Proxies with
    automatic retries, exponential backoff, concurrency helpers, and ergonomic clients. Official
    SDKs ship for Python (pip install zenrows), Node.js/TypeScript, Go, and the browser. Sample
    projects and a Scrapy middleware are published from github.com/ZenRows. All SDKs are MIT-licensed.
